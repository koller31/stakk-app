<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        width: 512px;
        height: 512px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          145deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        overflow: hidden;
      }
      .icon-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .s2-text {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 220px;
        font-weight: 800;
        letter-spacing: -8px;
        background: linear-gradient(
          135deg,
          #e94560 0%,
          #ff6b6b 50%,
          #e94560 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 20px rgba(233, 69, 96, 0.4));
      }
      .label {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 48px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 12px;
        text-transform: uppercase;
        margin-top: -10px;
      }
    </style>
  </head>
  <body>
    <div class="icon-container">
      <div class="s2-text">S2</div>
      <div class="label">DEMO</div>
    </div>
  </body>
</html>
